version: '3.9'

services:
  neo4j:
    image: neo4j:5.24
    container_name: graph-memory-neo4j
    restart: unless-stopped
    environment:
      - NEO4J_AUTH=${NEO4J_USER:-neo4j}/${NEO4J_PASSWORD:-neo4j}
      - NEO4J_server_memory_heap_initial__size=2G
      - NEO4J_server_memory_heap_max__size=2G
      - NEO4J_server_http_listen__address=0.0.0.0:7474
      - NEO4J_server_bolt_listen__address=0.0.0.0:7687
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - ./neo4j/data:/data
      - ./neo4j/logs:/logs
      - ./neo4j/import:/var/lib/neo4j/import
      - ./neo4j/plugins:/plugins

  graphiti:
    build:
      context: ./graphiti
    image: graphiti-local
    container_name: graphiti-api
    restart: unless-stopped
    depends_on:
      - neo4j
    environment:
      GRAPHITI_API_KEY: ${GRAPHITI_API_KEY:-change-me}
      GRAPHITI_LOG_LEVEL: info
      GRAPHITI_NEO4J_URL: bolt://neo4j:7687
      GRAPHITI_NEO4J_USER: ${NEO4J_USER:-neo4j}
      GRAPHITI_NEO4J_PASSWORD: ${NEO4J_PASSWORD:-neo4j}
      GRAPHITI_SERVER_PORT: 8083
    ports:
      - "8083:8083"
    volumes:
      - ./graphiti/config.yaml:/app/config.yaml:ro
